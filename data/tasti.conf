# SmartOneHandWriter — mappatura FUNZIONE = TASTO (frontend Windows).
#
# Il FE legge questo file all'avvio: alla pressione del TASTO invia la FUNZIONE
# corrispondente al motore. Va messo nella cartella  data\  accanto all'eseguibile.
# Se il file manca (o non contiene binding validi) valgono i default di fabbrica,
# che coincidono con le righe qui sotto.
#
# Sintassi (una riga per funzione):   funzione = tasto [altro_tasto ...]
#   - '#' avvia un commento fino a fine riga.
#   - Più tasti separati da spazio o virgola invocano la stessa funzione.
#   - Rimappare una funzione ne SPOSTA il tasto (il file sostituisce del tutto i default).
#
# TASTO ammessi:
#   - una lettera  A..Z   (attiva come FUNZIONE solo in Assistita/Multi-tap: in
#     Classica le lettere si digitano)
#   - una cifra    0..9
#   - un nome speciale (non fa differenza fra maiuscole/minuscole):
#       Spazio  Tab  Backspace  BlocMaiusc  Esc  Backtick
#     (Backtick = il tasto ` a sinistra dell'1)
#
# NB: non assegnare funzioni ai tasti-gruppo T9  W E A S D Z X C  (servono a
#     digitare le lettere): li intercetterebbe come funzioni.

# --- comandi comuni a tutte le modalità (tasti non-lettera) ---
conferma_continua = Spazio           # conferma la parola e prosegue (lo "0" del tastierino)
cancella_parola   = Tab
cancella_lettera  = Backspace BlocMaiusc
scarta            = Esc
punto             = 1
virgola           = 2
domanda           = 3
esclamativo       = 4
write             = 5                 # incolla il testo nell'app attiva (Ctrl+V)
read              = Backtick          # legge la selezione/clipboard nel buffer

# --- funzioni su tasti-lettera (attive in Assistita e Multi-tap) ---
roll        = F                       # cicla i candidati / la riga next-word
conferma    = G                       # chiude la parola aperta
avanti      = R                       # apre una nuova parola a destra
apri        = T                       # riapre la parola selezionata per modificarla
naviga_prev = V                       # sposta la selezione a sinistra
naviga_next = B                       # sposta la selezione a destra
